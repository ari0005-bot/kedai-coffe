<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Akun - Nōma Coffi Bar</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-image: url(img/Brown\ Retro\ Vintage\ Cafe\ and\ Restaurant\ Label\ Logo.png);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .login-container {
        max-width: 400px;
        padding: 40px;
        border-radius: 15px;
        background-color: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }
      .login-header {
        color: #2f1b0c;
        font-weight: bold;
      }
      .btn-warning {
        background-color: #ffc107;
        border-color: #ffc107;
        color: #2f1b0c;
        font-weight: bold;
      }
      .btn-warning:hover {
        background-color: #e0a800;
        border-color: #e0a800;
        color: #2f1b0c;
      }
      .form-control:focus {
        border-color: #ffc107;
        box-shadow: 0 0 0 0.25rem rgba(255, 193, 7, 0.25);
      }
      .logo-text {
        color: #2f1b0c;
      }
      #loginMessage {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="login-container text-center">
      <h2 class="login-header mb-4">
        <i class="bi bi-person-circle me-2"></i> Masuk Akun
      </h2>
      <p class="logo-text fw-bold fs-5 mb-4">Nōma Coffi Bar</p>

      <form action="kedai_coffe.html" method="POST">
        <div class="mb-3 input-group">
          <span class="input-group-text"
            ><i class="bi bi-envelope-fill"></i
          ></span>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Email Anda"
            required
          />
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Kata Sandi"
            required
          />
        </div>

        <div class="d-grid mt-4">
          <button type="submit" class="btn btn-warning btn-lg">Login</button>
        </div>

        <hr class="my-4" />

        <p class="text-muted small mb-1">Belum punya akun?</p>
        <a
          href="daftar.html"
          class="text-decoration-none"
          style="color: #976634"
          >Daftar di sini</a
        >
        <br />
        <a
          href="index.html"
          class="text-decoration-none small mt-2 d-inline-block"
          style="color: #2f1b0c"
        >
          <i class="bi bi-arrow-left-circle-fill"></i> Kembali ke Beranda
        </a>
      </form>
    </div>
  </body>
</html>
